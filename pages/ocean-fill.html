<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Ocean Fill Letter</title>
    <link rel="stylesheet" href="../css/ocean-fill.css">
    <link rel="stylesheet" href="../css/global-bgm.css">
    <link rel="stylesheet" href="../css/global-wrap.css">
</head>
<body>
    <div class="screen" id="gameScreen">
        <img src="../assets/backgrounds/ocean_fill.png" class="bg" alt="Ocean Fill Background">

        <div id="scoreBoard">
           ⭐ <span id="scoreVal">0</span>
        </div>

        <audio id="audioCorrect" src="../assets/audio/correct.mp3"></audio>
        <audio id="audioWrong" src="../assets/audio/wrong.mp3"></audio>
        <audio id="audioWin" src="../assets/audio/excellent.mp3"></audio>

        <div id="blank-shark" class="filled-letter"></div>
        <div id="blank-boat" class="filled-letter"></div>

        <div id="group-shark">
            <button class="hotspot" id="btn-shark-a" onclick="checkAnswer('shark', 'A', true)"></button>
            <button class="hotspot" id="btn-shark-e" onclick="checkAnswer('shark', 'E', false)"></button>
            <button class="hotspot" id="btn-shark-i" onclick="checkAnswer('shark', 'I', false)"></button>
        </div>

        <div id="group-boat">
            <button class="hotspot" id="btn-boat-a" onclick="checkAnswer('boat', 'A', false)"></button>
            <button class="hotspot" id="btn-boat-o" onclick="checkAnswer('boat', 'O', true)"></button>
            <button class="hotspot" id="btn-boat-i" onclick="checkAnswer('boat', 'I', false)"></button>
        </div>

        <div id="overlay"></div>
        <div id="feedbackBox">
            <button id="tryAgainBtn" class="actionBtn" onclick="closeFeedback()"></button>
            <button id="nextBtn" class="nextBtn" onclick="window.location.href='./ocean-listen.html'">NEXT</button>
        </div>
    </div>
    
    <script src="../js/ocean-fill.js"></script>
    <script src="../js/global-bgm.js"></script>
    <script src="../js/global-wrap.js"></script>
</body>
</html>
