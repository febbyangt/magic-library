<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jungle - Find the Animal</title>
    <link rel="stylesheet" href="../css/jungle-find.css">
    <link rel="stylesheet" href="../css/global-bgm.css">
    <link rel="stylesheet" href="../css/global-wrap.css">
</head>
<body>
    <div class="screen" id="gameScreen">
        <img src="../assets/backgrounds/jungle_find.png" class="bg" alt="Jungle Blank Background">

        <audio id="audioCorrect" src="../assets/audio/correct.mp3"></audio>
        <audio id="audioWrong" src="../assets/audio/wrong.mp3"></audio>

        <div class="score-board">
            ⭐ <span id="score-text">0</span>
        </div>

        <div class="prompt-board">
            Find and tap the <br> <span class="highlight-text">MONKEY !</span>
        </div>

        <img src="../assets/elements/monkey.png" id="anim-monkey" class="animal-sprite" onclick="checkAnimal('monkey', this)">
        <img src="../assets/elements/zebra.png" id="anim-zebra" class="animal-sprite" onclick="checkAnimal('zebra', this)">
        <img src="../assets/elements/giraffe.png" id="anim-giraffe" class="animal-sprite" onclick="checkAnimal('giraffe', this)">
        <img src="../assets/elements/lion.png" id="anim-lion" class="animal-sprite" onclick="checkAnimal('lion', this)">
        <img src="../assets/elements/tiger.png" id="anim-tiger" class="animal-sprite" onclick="checkAnimal('tiger', this)">
        <img src="../assets/elements/squirrel.png" id="anim-squirrel" class="animal-sprite" onclick="checkAnimal('squirrel', this)">
        <img src="../assets/elements/bird.png" id="anim-bird" class="animal-sprite" onclick="checkAnimal('bird', this)">
        <img src="../assets/elements/butterfly.png" id="anim-butterfly" class="animal-sprite" onclick="checkAnimal('butterfly', this)">

        <div id="wrongModal" class="modal-overlay">
            <div class="modal-image-container">
                <img src="../assets/buttons/jungle_tryagain.png" alt="Oops Try Again" class="popup-img">
                <button class="hotspot-try-again" onclick="closeModal()"></button>
            </div>
        </div>

        <div id="correctModal" class="modal-overlay">
            <div class="modal-image-container">
                <img src="../assets/buttons/jungle_excellent.png" alt="Success!" class="popup-img">
                <button id="nextBtnPopup" onclick="window.location.href='./jungle-complete.html'">COMPLETE</button>
            </div>
        </div>
    </div>

    <script src="../js/jungle-find.js"></script>
    <script src="../js/global-bgm.js"></script>
    <script src="../js/global-wrap.js"></script>
</body>
</html>
