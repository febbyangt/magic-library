<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Space Fill the Missing Letter</title>
    <link rel="stylesheet" href="../css/space-fill.css">
    <link rel="stylesheet" href="../css/global-bgm.css">
    <link rel="stylesheet" href="../css/global-wrap.css">
</head>
<body>
    <div class="screen" id="gameScreen">
        <!-- Background -->
        <img src="../assets/backgrounds/space_fill.png" class="bg" alt="Space Fill Background">

        <!-- Papan Skor -->
        <div id="scoreBoard">
            ⭐ <span id="scoreVal">0</span>
        </div>

        <!-- Audio -->
        <audio id="audioCorrect" src="../assets/audio/correct.mp3"></audio>
        <audio id="audioWrong" src="../assets/audio/wrong.mp3"></audio>
        <audio id="audioWin" src="../assets/audio/excellent.mp3"></audio>

        <!-- Huruf Pengisi (Muncul jika jawaban benar) -->
        <div id="fill-rocket" class="filled-letter">O</div>
        <div id="fill-star" class="filled-letter">A</div>

        <!-- Hotspot untuk Soal 1: ROCKET (Pilihan: U, K, O) -->
        <!-- O adalah jawaban benar -->
        <button class="hotspot" id="btn-r-u" onclick="checkAnswer('rocket', false, this)"></button>
        <button class="hotspot" id="btn-r-k" onclick="checkAnswer('rocket', false, this)"></button>
        <button class="hotspot" id="btn-r-o" onclick="checkAnswer('rocket', true, this)"></button>

        <!-- Hotspot untuk Soal 2: STAR (Pilihan: A, O, S) -->
        <!-- A adalah jawaban benar -->
        <button class="hotspot" id="btn-s-a" onclick="checkAnswer('star', true, this)"></button>
        <button class="hotspot" id="btn-s-o" onclick="checkAnswer('star', false, this)"></button>
        <button class="hotspot" id="btn-s-s" onclick="checkAnswer('star', false, this)"></button>

        <!-- Pop-Up Modal -->
        <div id="overlay"></div>
        <div id="feedbackBox">
            <button id="tryAgainBtn" class="actionBtn" onclick="closeFeedback()"></button>
            <button id="nextBtn" class="nextBtn" onclick="window.location.href='./space-listen.html'">NEXT</button>
        </div>
    </div>
    
    <script src="../js/space-fill.js"></script>
    <script src="../js/global-bgm.js"></script>
    <script src="../js/global-wrap.js"></script>
</body>
</html>
