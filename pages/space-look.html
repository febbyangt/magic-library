<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Space Look & Choose</title>
    <link rel="stylesheet" href="../css/space-look.css">
    <link rel="stylesheet" href="../css/global-bgm.css">
    <link rel="stylesheet" href="../css/global-wrap.css">
</head>
<body>
    <div class="screen" id="gameScreen">
        <img src="../assets/backgrounds/space_look.png" class="bg" alt="Space Look Background">

        <div id="scoreBoard">
            ⭐ <span id="scoreVal">0</span>
        </div>

        <audio id="audioCorrect" src="../assets/audio/correct.mp3"></audio>
        <audio id="audioWrong" src="../assets/audio/wrong.mp3"></audio>
        <audio id="audioWin" src="../assets/audio/excellent.mp3"></audio>

        <button id="choiceStar" class="hotspot" onclick="showFeedback(false)"></button>
        <button id="choiceMoon" class="hotspot" onclick="showFeedback(false)"></button>
        <button id="choiceRocket" class="hotspot" onclick="showFeedback(true)"></button>

        <div id="overlay"></div>
        <div id="feedbackBox">
            <button id="tryAgainBtn" class="actionBtn" onclick="closeFeedback()"></button>
            <button id="nextBtn" class="nextBtn" onclick="window.location.href='./space-match.html'">NEXT</button>
        </div>
    </div>
    
    <script src="../js/space-look.js"></script>
    <script src="../js/global-bgm.js"></script>
    <script src="../js/global-wrap.js"></script>
</body>
</html>
