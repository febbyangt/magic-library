<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Space Listen & Choose</title>
    <link rel="stylesheet" href="../css/space-listen.css">
    <link rel="stylesheet" href="../css/global-bgm.css">
    <link rel="stylesheet" href="../css/global-wrap.css">
</head>
<body>
    <div class="screen" id="gameScreen">
        <img src="../assets/backgrounds/space_listen.png" class="bg" alt="Space Listen Background">

        <div id="scoreBoard">
            ⭐ <span id="scoreVal">0</span>
        </div>

        <audio id="audioQuestion" src="../assets/audio/planet.mp3"></audio> 
        <audio id="audioCorrect" src="../assets/audio/correct.mp3"></audio>
        <audio id="audioWrong" src="../assets/audio/wrong.mp3"></audio>
        <audio id="audioWin" src="../assets/audio/excellent.mp3"></audio>

        <button class="hotspot speaker-btn" id="btn-speaker" onclick="playQuestion()"></button>

        <button class="hotspot choice-btn" id="btn-planet" onclick="checkAnswer('planet')"></button>
        <button class="hotspot choice-btn" id="btn-rocket" onclick="checkAnswer('rocket')"></button>
        <button class="hotspot choice-btn" id="btn-moon" onclick="checkAnswer('moon')"></button>

        <div id="overlay"></div>
        <div id="feedbackBox">
            <button id="tryAgainBtn" class="actionBtn" onclick="closeFeedback()"></button>
            <button id="nextBtn" class="nextBtn" onclick="window.location.href='./space-find.html'">NEXT</button>
        </div>
    </div>
    
    <script src="../js/space-listen.js"></script>
    <script src="../js/global-bgm.js"></script>
    <script src="../js/global-wrap.js"></script>
</body>
</html>
