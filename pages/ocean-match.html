<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Ocean Match Word</title>
    <link rel="stylesheet" href="../css/ocean-match.css">
    <link rel="stylesheet" href="../css/global-bgm.css">
    <link rel="stylesheet" href="../css/global-wrap.css">
</head>
<body>
    <div class="screen" id="gameScreen">
        <img src="../assets/backgrounds/ocean_match.png" class="bg" alt="Ocean Background">

        <div id="scoreBoard">
            ⭐ <span id="scoreVal">0</span>
        </div>

        <audio id="audioCorrect" src="../assets/audio/correct.mp3"></audio>
        <audio id="audioWrong" src="../assets/audio/wrong.mp3"></audio>
        <audio id="audioWin" src="../assets/audio/excellent.mp3"></audio>

        <div class="draggable-container">
            <div class="word-box yellow" draggable="true" id="word-boat" data-match="boat">BOAT</div>
            <div class="word-box blue" draggable="true" id="word-coral" data-match="coral">CORAL</div>
            <div class="word-box pink" draggable="true" id="word-shark" data-match="shark">SHARK</div>
            <div class="word-box green" draggable="true" id="word-jelly" data-match="jelly">JELLYFISH</div>
        </div>

        <div class="drop-zone" id="drop-jelly" data-match="jelly"></div>
        <div class="drop-zone" id="drop-shark" data-match="shark"></div>
        <div class="drop-zone" id="drop-boat" data-match="boat"></div>
        <div class="drop-zone" id="drop-coral" data-match="coral"></div>

        <div id="overlay"></div>
        <div id="feedbackBox">
            <button id="tryAgainBtn" class="actionBtn" onclick="closeFeedback()"></button>
            <button id="nextBtn" class="nextBtn" onclick="window.location.href='./ocean-fill.html'">NEXT</button>
        </div>
    </div>
    
    <script src="../js/ocean-match.js"></script>
    <script src="../js/global-bgm.js"></script>
    <script src="../js/global-wrap.js"></script>
</body>
</html>
