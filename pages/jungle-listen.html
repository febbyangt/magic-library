<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jungle - Listen & Choose</title>
    <link rel="stylesheet" href="../css/jungle-listen.css">
    <link rel="stylesheet" href="../css/global-bgm.css">
    <link rel="stylesheet" href="../css/global-wrap.css">
</head>
<body>
    <div class="screen" id="gameScreen">
        <img src="../assets/backgrounds/jungle_listen.png" class="bg" alt="Jungle Listen Background">

        <audio id="audioQuestion" src="../assets/audio/flower.mp3"></audio> 
        <audio id="audioCorrect" src="../assets/audio/correct.mp3"></audio>
        <audio id="audioWrong" src="../assets/audio/wrong.mp3"></audio>

        <div class="score-board">
            ⭐ <span id="score-text">0</span>
        </div>

        <button class="speaker-main" id="btn-speaker" onclick="playQuestion()"></button>

        <button class="card-hotspot" id="btn-flower" onclick="checkAnswer('Flower', this)"></button>
        <button class="card-hotspot" id="btn-tiger" onclick="checkAnswer('Tiger', this)"></button>
        <button class="card-hotspot" id="btn-tree" onclick="checkAnswer('Tree', this)"></button>

        <div id="wrongModal" class="modal-overlay">
            <div class="modal-image-container">
                <img src="../assets/buttons/jungle_tryagain.png" alt="Oops Try Again" class="popup-img">
                <button class="hotspot-try-again" onclick="closeModal()"></button>
            </div>
        </div>

        <div id="correctModal" class="modal-overlay">
            <div class="modal-image-container">
                <img src="../assets/buttons/jungle_excellent.png" alt="Success!" class="popup-img">
                <button id="nextBtnPopup" onclick="window.location.href='./jungle-find.html'">NEXT</button>
            </div>
        </div>
    </div>

    <script src="../js/jungle-listen.js"></script>
    <script src="../js/global-bgm.js"></script>
    <script src="../js/global-wrap.js"></script>
</body>
</html>
