<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Ocean Listen & Choose</title>
    <link rel="stylesheet" href="../css/ocean-listen.css">
    <link rel="stylesheet" href="../css/global-bgm.css">
    <link rel="stylesheet" href="../css/global-wrap.css">
</head>
<body>
    <div class="screen" id="gameScreen">
        <img src="../assets/backgrounds/ocean_listen.png" class="bg" alt="Ocean Listen Background">

        <div id="scoreBoard">
            ⭐ <span id="scoreVal">0</span>
        </div>

        <audio id="audioQuestion" src="../assets/audio/shark.mp3"></audio> 
        <audio id="audioCorrect" src="../assets/audio/correct.mp3"></audio>
        <audio id="audioWrong" src="../assets/audio/wrong.mp3"></audio>
        <audio id="audioWin" src="../assets/audio/excellent.mp3"></audio>

        <button class="hotspot" id="btn-speaker" onclick="playQuestion()"></button>

        <button class="hotspot" id="btn-shark" onclick="checkAnswer('shark')"></button>
        <button class="hotspot" id="btn-coral" onclick="checkAnswer('coral')"></button>
        <button class="hotspot" id="btn-jelly" onclick="checkAnswer('jellyfish')"></button>

        <div id="overlay"></div>
        <div id="feedbackBox">
            <button id="tryAgainBtn" class="actionBtn" onclick="closeFeedback()"></button>
            <button id="nextBtn" class="nextBtn" onclick="window.location.href='./ocean-find.html'">NEXT</button>
        </div>
    </div>
    
    <script src="../js/ocean-listen.js"></script>
    <script src="../js/global-bgm.js"></script>
    <script src="../js/global-wrap.js"></script>
</body>
</html>
